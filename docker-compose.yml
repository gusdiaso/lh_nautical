version: '3.8'

services:
    db_lh_nauticals:
        image: postgres:latest
        container_name: postgres_lh
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: lh_nauticals
        ports:
            - '5432:5432'
        volumes:
            - postgres_data:/var/lib/postgresql

volumes:
    postgres_data:
